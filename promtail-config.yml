server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: syncdesk_file_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: syncdesk_api
          source: file
          __path__: /var/log/api/*.json
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            user_id: user_id
            request_id: request_id
            trace_id: trace_id
            path: path
            method: method
            status_code: status_code
      - labels:
          level:
          logger:
          method:
          status_code:
          request_id:
          user_id:
      - output:
          source: message

